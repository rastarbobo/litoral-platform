on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    name: Deploy to Cloudflare Workers
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        uses: oxc-project/oxlint-action@v3.0.0
        with:
          version: 1.66.0
        continue-on-error: true

      - name: Typecheck
        run: pnpm run typecheck
        continue-on-error: true

      - name: Unit tests
        run: pnpm run test:unit
        continue-on-error: true

      - name: Integration tests
        run: pnpm run test:integration
        continue-on-error: true

      - name: Set D1 database name
        id: set-db
        run: |
          echo "D1_DATABASE_NAME=$(node scripts/get-db-name.mjs)" >> "$GITHUB_ENV"

      - name: Expose public GitHub variables
        env:
          GITHUB_VARIABLES_JSON: ${{ toJSON(vars) }}
        run: |
          node <<'NODE'
          const variables = JSON.parse(process.env.GITHUB_VARIABLES_JSON || '{}');
          const publicVariables = Object.keys(variables)
            .filter((name) => /^NEXT_PUBLIC_[A-Z0-9_]+$/.test(name))
            .sort();

          for (const name of publicVariables) {
            const delimiter = `GITHUB_ENV_${name}_${Date.now()}`;
            fs.appendFileSync(
              process.env.GITHUB_ENV,
              `${name}<<${delimiter}\n${variables[name]}\n${delimiter}\n`
            );
          }

          console.log(
            publicVariables.length > 0
              ? `Exposed public variables: ${publicVariables.join(', ')}`
              : 'No NEXT_PUBLIC_* GitHub variables found.'
          );
          NODE

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: End-to-end tests
        run: pnpm run test:e2e
        continue-on-error: true

      - name: Verify Cloudflare auth
        run: |
          echo "Verifying Cloudflare authentication..."
          npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build and deploy
        run: pnpm run build && pnpm run deploy --skip-build
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run DB migrations
        if: success()
        run: pnpm wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote
        continue-on-error: true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Purge Cloudflare CDN cache
        if: success() && vars.CLOUDFLARE_ZONE_ID != ''
        uses: actions/github-script@v9
        env:
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          script: |
            const zoneId = process.env.CLOUDFLARE_ZONE_ID;
            const apiToken = process.env.CLOUDFLARE_API_TOKEN;

            if (!zoneId || !apiToken) {
              core.setFailed('CLOUDFLARE_ZONE_ID and CLOUDFLARE_API_TOKEN are required');
              return;
            }

            const response = await fetch(
              `https://api.cloudflare.com/client/v4/zones/${zoneId}/purge_cache`,
              {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${apiToken}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ purge_everything: true }),
              }
            );

            const body = await response.text();
            const result = body ? JSON.parse(body) : {};

            if (!response.ok || !result.success) {
              const errors = Array.isArray(result.errors)
                ? result.errors.map((error) => error.message).filter(Boolean)
                : [];
              core.setFailed(`Cloudflare cache purge failed: ${errors.length > 0 ? errors.join('; ') : response.statusText}`);
              return;
            }

            core.info(
              result.result?.id
                ? `Cloudflare CDN cache purged: ${result.result.id}`
                : 'Cloudflare CDN cache purged'
            );
