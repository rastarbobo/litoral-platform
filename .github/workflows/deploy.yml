on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    name: Deploy to Cloudflare Workers
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        uses: oxc-project/oxlint-action@v3.0.0
        with:
          version: 1.66.0
        continue-on-error: true

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm run test:unit

      - name: Integration tests
        run: pnpm run test:integration

      - name: Set D1 environment variables
        id: set-d1-vars
        run: |
          echo "D1_DATABASE_NAME=$(node scripts/get-db-name.mjs)" >> "$GITHUB_ENV"

      - name: Expose public GitHub variables
        env:
          GITHUB_VARIABLES_JSON: ${{ toJSON(vars) }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const variables = JSON.parse(process.env.GITHUB_VARIABLES_JSON || "{}");
          const publicVariableNames = Object.keys(variables)
            .filter((name) => /^NEXT_PUBLIC_[A-Z0-9_]+$/.test(name))
            .sort();

          for (const name of publicVariableNames) {
            const delimiter = `GITHUB_ENV_${name}_${Date.now()}`;
            fs.appendFileSync(
              process.env.GITHUB_ENV,
              `${name}<<${delimiter}\n${variables[name]}\n${delimiter}\n`
            );
          }

          console.log(
            publicVariableNames.length > 0
              ? `Exposed public variables: ${publicVariableNames.join(", ")}`
              : "No NEXT_PUBLIC_* GitHub variables found."
          );
          NODE

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright system dependencies
        run: pnpm exec playwright install-deps chromium

      - name: Install Playwright Chromium
        if: ${{ steps.playwright-cache.outputs.cache-hit != 'true' }}
        run: pnpm exec playwright install chromium

      - name: End-to-end tests
        run: pnpm run test:e2e

      - name: Deploy
        run: |
          set -o pipefail
          pnpm run deploy --skip-build 2>&1 | tee deploy-output.log
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Run DB migrations
        run: pnpm wrangler d1 migrations apply "$D1_DATABASE_NAME" --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Purge Cloudflare CDN cache
        if: ${{ vars.CLOUDFLARE_ZONE_ID != '' }}
        uses: actions/github-script@v9
        env:
          CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        with:
          script: |
            const zoneId = process.env.CLOUDFLARE_ZONE_ID;
            const apiToken = process.env.CLOUDFLARE_API_TOKEN;

            if (!zoneId) {
              core.setFailed("CLOUDFLARE_ZONE_ID is required");
              return;
            }

            if (!apiToken) {
              core.setFailed("CLOUDFLARE_API_TOKEN is required");
              return;
            }

            const response = await fetch(
              `https://api.cloudflare.com/client/v4/zones/${zoneId}/purge_cache`,
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${apiToken}`,
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ purge_everything: true }),
              }
            );

            const body = await response.text();
            const result = body ? JSON.parse(body) : {};

            if (!response.ok || !result.success) {
              const errors = Array.isArray(result.errors)
                ? result.errors.map((error) => error.message).filter(Boolean)
                : [];
              const reason = errors.length > 0 ? errors.join("; ") : response.statusText;

              core.setFailed(`Cloudflare cache purge failed: ${reason}`);
              return;
            }

            const purgeId = result.result?.id;
            core.info(
              purgeId
                ? `Cloudflare CDN cache purge requested: ${purgeId}`
                : "Cloudflare CDN cache purge requested"
            );

      - name: Capture deploy size metrics
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");

          const log = fs.readFileSync("deploy-output.log", "utf8");
          const sanitizedLog = log.replace(/\u001b\[[0-9;]*m/g, "");
          const match = sanitizedLog.match(
            /Total Upload:\s*([0-9.]+)\s*([KMGT]?i?B)(?:\s*\/\s*|\s+)(?:gzip|gzipped)\s*:\s*([0-9.]+)\s*([KMGT]?i?B)/i
          );

          if (!match) {
            throw new Error("Could not find deploy size metrics in deploy output.");
          }

          const [, totalValueRaw, totalUnitRaw, gzipValueRaw, gzipUnitRaw] = match;

          function toBytes(value, unit) {
            const normalizedUnit = unit.toUpperCase();
            const base = normalizedUnit.includes("IB") ? 1024 : 1000;
            const powers = {
              B: 0,
              KB: 1,
              MB: 2,
              GB: 3,
              TB: 4,
              KIB: 1,
              MIB: 2,
              GIB: 3,
              TIB: 4,
            };

            const power = powers[normalizedUnit];
            if (power === undefined) {
              throw new Error(`Unsupported size unit: ${unit}`);
            }

            return Math.round(Number(value) * base ** power);
          }

          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const projectName = packageJson.name;
          const metricsPath = path.join("metrics", `${projectName}-deploy-size-history.jsonl`);
          const totalBytes = toBytes(totalValueRaw, totalUnitRaw);
          const gzipBytes = toBytes(gzipValueRaw, gzipUnitRaw);
          const now = new Date().toISOString();
          const sha = (process.env.GITHUB_SHA ?? "").slice(0, 5);
          const runId = process.env.GITHUB_RUN_ID ?? "";
          const runNumber = process.env.GITHUB_RUN_NUMBER ?? "";
          const branch = process.env.GITHUB_REF_NAME ?? "";

          fs.mkdirSync(path.dirname(metricsPath), { recursive: true });
          const line = JSON.stringify({
            timestamp: now,
            branch,
            totalUploadRaw: `${totalValueRaw} ${totalUnitRaw}`,
            gzipRaw: `${gzipValueRaw} ${gzipUnitRaw}`,
            totalUploadBytes: totalBytes,
            gzipBytes,
            commitSha: sha,
            runId,
            runNumber,
          });

          fs.appendFileSync(metricsPath, `${line}\n`);
          console.log(
            `Recorded deploy size metrics for ${projectName}: total=${totalBytes}B gzip=${gzipBytes}B`
          );
          NODE

      - name: Commit deploy size metrics
        if: ${{ success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metrics/*-deploy-size-history.jsonl
          if git diff --cached --quiet; then
            echo "No deploy size metrics changes to commit."
            exit 0
          fi
          git commit -m "chore: record deploy size metrics [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
